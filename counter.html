<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="counter.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100%;
            width: 100%;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .box{
            position: absolute;
            top: 30vh;
        }
        .box>button{
            padding: 10px;
            border-radius: 10px;
            margin-right: 10px;
            margin-top: 25px;
        }
        .box>button:hover{
            background-color: black;
            color: white;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h3 style="text-align: center;font-size: 50px;">Counter</h3>
            <h3 class="val" style="text-align: center;font-size: 50px;margin-top: 20px;">0</h3>
            <button class="one">DECRESE</button>
            <button class="two">RESET</button>
            <button class="three">INCREASE</button>
        </div>
    </div>
    <script src="counter.js"></script>
</body>
</html>
